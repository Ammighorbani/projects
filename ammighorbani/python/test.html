<input id="msg">
<button onclick="send()">send</button>

<div id="chat"></div>

<script>

	let ws = new WebSocket("ws://localhost:8000/ws/1")

	ws.onmessage = (event)=>{
			document.getElementById("chat").innerHTML += "<div>"+event.data+"</div>"
		}

	function send(){
			let m = document.getElementById("msg").value
			ws.send(m)
		}

</script>
