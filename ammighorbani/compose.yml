networks:
  ammighorbani:
    name: ammighorbani

volumes:
  ammighorbani-data:
  mysql_data:
  mongo_data:
  minio_data:

services:
  
  nginx:
    image: nginx:alpine
    container_name: ammighorbani-nginx
    ports:
      - 8080:80
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build: ./php
    container_name: ammighorbani-php
    volumes:
      - ./src:/var/www/html

  mysql:
    image: mysql:8.0
    container_name: ammighorbani-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Ammighorbani12
      MYSQL_DATABASE: messenger
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:7
    container_name: ammighorbani-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: ammighorbani-redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: ammighorbani-minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Ammighorbani12
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data



